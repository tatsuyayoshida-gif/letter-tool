// ---- 診断レポートPDFから導入文を自動作成 ----
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}

async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let fullText = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(it => it.str).join("\n") + "\n\n";
  }
  return fullText;
}

function firstMatch(re, text) {
  const m = text.match(re);
  return m ? m[1].trim() : null;
}

function allMatches(re, text) {
  return [...text.matchAll(re)].map(m => m[1].trim());
}

function parseReportText(text) {
  const norm = text.replace(/[（(]/g, "（").replace(/[）)]/g, "）").replace(/[％]/g, "%");

  const company = firstMatch(/([^\n]{1,40}?)\s*御中/, norm);
  const industry = firstMatch(/「(.+?)」\s*の\s*AI\s*検索事情/, norm);
  const brand = firstMatch(/([一-龠ぁ-んァ-ヶー0-9A-Za-z]{1,12}?)が出現/, norm);

  const appearancePct = allMatches(/貴社\s*\n?\s*(\d+)\s*%/g, norm);
  const competitorAvgPct = allMatches(/競合平均\s*\n?\s*(\d+)\s*%/g, norm);

  let competitors = firstMatch(/競合他社\s*\n?([\s\S]{0,200}?)\n\s*重視するポイント/, norm);
  if (competitors) {
    competitors = competitors.split(/[、,]/).map(s => s.trim()).filter(Boolean).slice(0, 3).join("・");
  }

  return {
    company,
    industry,
    brand,
    appearanceMine: appearancePct[0] || null,
    appearanceCompAvg: competitorAvgPct[0] || null,
    officialUrlMine: appearancePct[1] || null,
    officialUrlCompAvg: competitorAvgPct[1] || null,
    competitors,
  };
}

function buildIndustryParagraphFromReport(d) {
  const industry = d.industry || "貴社の業界";
  const brand = d.brand || d.company || "貴社";
  const hasStats = d.appearanceMine && d.appearanceCompAvg;

  if (!hasStats) {
    return `実際に弊社で${industry}におけるAI検索の実態を調査したところ、貴社の可視性・引用のされ方に競合との明確な差が見られました。ChatGPTなどの生成AIが情報収集の入り口として急速に普及する中、貴社が"AIにどう認識され、どう説明されているか"が、そのまま商談機会の増減に直結する時代になりつつあります。`;
  }

  let sentence = `実際に弊社で${industry}におけるAI検索の実態を調査したところ、貴社「${brand}」はChatGPT検索において出現率${d.appearanceMine}%`;
  if (d.officialUrlMine) sentence += `・公式サイト引用率${d.officialUrlMine}%`;
  sentence += `と、競合平均(出現率${d.appearanceCompAvg}%`;
  if (d.officialUrlCompAvg) sentence += `・引用率${d.officialUrlCompAvg}%`;
  sentence += `)を大きく上回る結果が出ています。`;
  if (d.competitors) {
    sentence += `${d.competitors}などの競合と比較しても高い可視性を維持されていますが、`;
  } else {
    sentence += `一方で、`;
  }
  sentence += `トピックによってはAIがどの情報源を根拠に回答を組み立てているかにばらつきがあり、この差が今後の商談機会・ブランド想起に直結してまいります。`;
  return sentence;
}

function initReportUpload() {
  const input = document.getElementById('reportPdf');
  const status = document.getElementById('reportStatus');
  if (!input) return;

  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;
    status.className = 'busy';
    status.textContent = '解析中…';

    try {
      if (typeof pdfjsLib === 'undefined') throw new Error('PDF読み込みライブラリが利用できません（ネット接続を確認してください）');
      const text = await extractPdfText(file);
      const data = parseReportText(text);

      if (data.company) document.getElementById('toCompany').value = data.company;
      document.getElementById('industryLine').value = buildIndustryParagraphFromReport(data);
      render();

      const found = Object.entries(data).filter(([, v]) => v).map(([k]) => k);
      if (found.length === 0) {
        status.className = 'err';
        status.textContent = 'レポートから数値を抽出できませんでした。手動で導入文を編集してください。';
      } else {
        status.className = 'ok';
        status.textContent = `抽出結果：会社名=${data.company || '?'} / 業界=${data.industry || '?'} / ブランド=${data.brand || '?'} / 出現率=${data.appearanceMine || '?'}% (競合平均${data.appearanceCompAvg || '?'}%) / 公式URL出現率=${data.officialUrlMine || '?'}% (競合平均${data.officialUrlCompAvg || '?'}%)\n内容を確認し、必要なら下の欄を手動で調整してください。`;
      }
    } catch (e) {
      status.className = 'err';
      status.textContent = '読み込みに失敗しました：' + e.message;
    }
  });
}

// ---- 保存済みドキュメント（localStorage） ----
const STORAGE_KEY = 'letterDocs';
const FIELD_IDS = ['toCompany','toDept','toZip','toAddr','hookLine','industryLine',
  'fromCompany','fromRep','fromZip','fromAddr','fromTel','staffName','staffMail','dateLine'];

function loadDocs() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  } catch (e) {
    return [];
  }
}

function saveDocs(docs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
}

function saveCurrentLetter() {
  const v = id => document.getElementById(id).value;
  const defaultTitle = `${v('toCompany')} ${v('toDept')}`.trim();
  const title = window.prompt("この手紙のタイトルを入力してください", defaultTitle);
  if (title === null) return; // キャンセル

  const fields = {};
  FIELD_IDS.forEach(id => fields[id] = v(id));

  const docs = loadDocs();
  docs.unshift({
    id: Date.now().toString(36),
    title: title || defaultTitle || "無題の手紙",
    savedAt: new Date().toLocaleString('ja-JP'),
    fields,
  });
  saveDocs(docs);
  renderDocList();
  alert("保存しました（このブラウザ内に保存されています）");
}

function openDoc(id) {
  const docs = loadDocs();
  const doc = docs.find(d => d.id === id);
  if (!doc) return;
  FIELD_IDS.forEach(fid => {
    if (fid in doc.fields) document.getElementById(fid).value = doc.fields[fid];
  });
  render();
}

function deleteDoc(id, ev) {
  ev.stopPropagation();
  if (!confirm("この手紙を削除しますか？")) return;
  const docs = loadDocs().filter(d => d.id !== id);
  saveDocs(docs);
  renderDocList();
}

function renderDocList() {
  const docs = loadDocs();
  const listEl = document.getElementById('docList');
  const emptyEl = document.getElementById('docEmpty');
  if (docs.length === 0) {
    listEl.innerHTML = "";
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";
  listEl.innerHTML = docs.map(d => `
    <li>
      <div class="docInfo" onclick="openDoc('${d.id}')">
        <div class="docTitle">${esc(d.title)}</div>
        <div class="docDate">${esc(d.savedAt)}</div>
      </div>
      <button onclick="deleteDoc('${d.id}', event)">削除</button>
    </li>
  `).join("");
}

// ---- Wordドキュメント出力（郵送情報つき・本物の.docx） ----
async function exportWord() {
  const v = id => document.getElementById(id).value;
  if (typeof docx === 'undefined') {
    alert('Word出力に必要なライブラリの読み込みに失敗しました。インターネット接続を確認して、ページを再読み込みしてください。');
    return;
  }
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, WidthType, BorderStyle, ShadingType, HeadingLevel } = docx;

  const FONT = "游明朝";
  const SIZE = 21; // 10.5pt = 21 half-points

  function linesToRuns(text, opts = {}) {
    const lines = (text || "").split("\n").map(s => s.trim()).filter(Boolean);
    const runs = [];
    lines.forEach((line, i) => {
      if (i > 0) runs.push(new TextRun({ text: "", break: 1 }));
      runs.push(new TextRun({ text: line, font: FONT, size: SIZE, bold: !!opts.bold }));
    });
    return runs;
  }

  function para(text, opts = {}) {
    return new Paragraph({
      alignment: opts.align || AlignmentType.LEFT,
      spacing: { after: opts.after ?? 200, line: 360 },
      pageBreakBefore: !!opts.pageBreakBefore,
      children: linesToRuns(text, opts),
    });
  }

  function heading(text, pageBreakBefore = false) {
    return new Paragraph({
      spacing: { after: 200 },
      pageBreakBefore,
      border: { bottom: { style: BorderStyle.SINGLE, size: 12, color: "333333" } },
      children: [new TextRun({ text, font: FONT, size: 26, bold: true })],
    });
  }

  const cellBorder = { style: BorderStyle.SINGLE, size: 4, color: "999999" };
  const borders = { top: cellBorder, bottom: cellBorder, left: cellBorder, right: cellBorder };

  function labelCell(text) {
    return new TableCell({
      width: { size: 20, type: WidthType.PERCENTAGE },
      shading: { type: ShadingType.CLEAR, fill: "F0F0F0" },
      borders,
      children: [new Paragraph({ children: [new TextRun({ text, font: FONT, size: 20, bold: true })] })],
    });
  }
  function valueCell(text) {
    return new TableCell({
      width: { size: 80, type: WidthType.PERCENTAGE },
      borders,
      children: [new Paragraph({ children: linesToRuns(text) })],
    });
  }
  function headCell(text) {
    return new TableCell({
      columnSpan: 2,
      shading: { type: ShadingType.CLEAR, fill: "E5E7EB" },
      borders,
      children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text, font: FONT, size: 20, bold: true })] })],
    });
  }

  function infoTable(headText, rows) {
    return new Table({
      width: { size: 100, type: WidthType.PERCENTAGE },
      rows: [
        new TableRow({ children: [headCell(headText)] }),
        ...rows.map(([label, value]) => new TableRow({ children: [labelCell(label), valueCell(value)] })),
      ],
    });
  }

  const toName = `${v('toCompany')}\n${v('toDept')}　御中`;
  const fromName = `${v('fromCompany')}\n${v('fromRep')}`;

  const doc = new Document({
    sections: [{
      children: [
        heading("■ 郵送情報（この情報をもとに封筒をご記入ください）"),
        infoTable("宛先（封筒 表面）", [
          ["郵便番号", `〒${v('toZip')}`],
          ["住所", v('toAddr')],
          ["宛名", toName],
        ]),
        para("", { after: 200 }),
        infoTable("差出人（封筒 裏面）", [
          ["郵便番号", `〒${v('fromZip')}`],
          ["住所", v('fromAddr')],
          ["氏名", fromName],
          ["電話番号", v('fromTel')],
        ]),
        para(`※本件担当：${v('staffName')}／Email：${v('staffMail')}`, { after: 200 }),

        heading("■ 手紙本文（このまま便箋に転記してください）", true),
        para(v('dateLine'), { align: AlignmentType.RIGHT }),
        para(toName, {}),
        para(fromName, { align: AlignmentType.RIGHT }),
        para("生成AI検索における貴社製品の見え方に関する無料診断のご案内", { align: AlignmentType.CENTER, bold: true, after: 300 }),
        para("拝啓　時下ますますご清栄のこととお慶び申し上げます。"),
        para(`突然のお手紙にて失礼いたします。私ども${v('fromCompany')}は、AI検索最適化(AEO)支援を専門としております。${v('hookLine')}`),
        para(v('industryLine')),
        para("弊社では、こうした変化に対応するため、貴社の製品・ブランドが主要な生成AI(ChatGPT、Google AI Mode等)でどのように検索・回答されているか、競合他社との比較も含めて可視化する「AI検索無料診断」を提供しております。"),
        para("診断では、以下のような点を無料でお調べし、レポートとしてお届けいたします。"),
        para("・貴社の製品名・技術名で生成AIに質問した際、どのような回答が生成されるか\n・競合他社と比較してAIにどう紹介されているか(強み・弱みの見え方)\n・現時点でのAI検索における改善余地"),
        para(`診断は無料・ご契約義務なしでご利用いただけます。ご興味をお持ちいただけましたら、下記担当までお気軽にご連絡くださいませ。${v('toDept')}様の製品・技術が、AI検索の場でも正しく・魅力的に伝わっているか、ぜひ一度ご確認いただければ幸いです。`),
        para("末筆ながら、貴社の益々のご発展を心よりお祈り申し上げます。"),
        para("敬具", { align: AlignmentType.RIGHT }),
        para(`${v('fromCompany')}\n${v('fromRep')}\n〒${v('fromZip')}　${v('fromAddr')}\nTEL：${v('fromTel')}\n本件担当：${v('staffName')}\nEmail：${v('staffMail')}`, { align: AlignmentType.RIGHT }),
      ],
    }],
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fname = `${v('toCompany')}_${v('toDept')}_ご案内状`.replace(/[\\/:*?"<>|]/g, '');
  a.href = url;
  a.download = `${fname}.docx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
